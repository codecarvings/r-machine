name: CI

on:
  # PR-only: the "Build, Test and Check" run on the PR is the sole gate. Branch
  # protection on `main` requires this check to pass AND the branch to be up to
  # date before merging, so the tested tree equals the merged tree — a duplicate
  # `push: main` run would only re-test what the PR already verified.
  pull_request:

jobs:
  build-test-and-check:
    name: Build, Test and Check
    runs-on: ubuntu-latest
    timeout-minutes: 20    

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup CI
        uses: ./.github/actions/ci-setup

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Build
        run: pnpm build

      - name: Run Test
        run: pnpm test:coverage

      - name: Run E2E
        run: pnpm test:e2e

      - name: Run Check
        # Use the non-writing variant so the job FAILS on format/lint drift.
        # `pnpm check` is `biome check --write .`, which auto-fixes safe issues
        # (all format drift) in the ephemeral checkout and exits 0 — no gating.
        run: pnpm check:dry

